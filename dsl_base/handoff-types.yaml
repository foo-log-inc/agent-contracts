dsl-task-request:
  version: 1
  description: Request to execute a DSL management task
  schema:
    type: object
    properties:
      task_id:
        type: string
        description: Identifier of the task to execute
      scope:
        type: string
        description: Scope of changes (agents, tasks, artifacts, workflow, bindings, etc.)
      context:
        type: string
        description: Background and purpose of the change
    required:
      - task_id

dsl-task-result:
  version: 2
  description: Result of a DSL management task execution
  schema:
    type: object
    properties:
      changed_files:
        type: array
        items:
          type: string
        description: List of changed file paths
      validation_result:
        type: string
        enum:
          - pass
          - fail
        description: Result of agent-contracts validate
      lint_result:
        type: string
        enum:
          - pass
          - fail
          - skipped
        description: Result of agent-contracts lint (separate from validate)
      drift_detected:
        type: boolean
        description: >-
          True if render --check detected drift between DSL source
          and generated outputs
      score:
        type: number
        description: Score command result (0-100)
      score_dimensions:
        type: object
        description: Per-dimension score breakdown
      notes:
        type: string
        description: Additional notes or improvement suggestions
    required:
      - validation_result

dsl-audit-result:
  version: 2
  description: Result of DSL audit (completeness, semantic design, or prompt fidelity)
  schema:
    type: object
    properties:
      audit_type:
        type: string
        enum:
          - completeness
          - semantic
          - prompt
        description: Which audit task produced this result
      total_dimensions:
        type: integer
        description: Number of dimensions inspected
      pass_count:
        type: integer
        description: Number of PASS dimensions
      miss_count:
        type: integer
        description: Number of MISS dimensions
      partial_count:
        type: integer
        description: Number of PARTIAL dimensions
      agents_reviewed:
        type: integer
        description: Number of agents reviewed (semantic and prompt audits)
      prompts_reviewed:
        type: integer
        description: Number of generated prompts compared (prompt audit)
      critical_gaps:
        type: array
        items:
          type: object
          properties:
            dimension:
              type: string
            agent:
              type: string
            gap_type:
              type: string
              enum:
                - template_gap
                - data_gap
                - dsl_gap
            severity:
              type: string
              enum:
                - critical
                - warning
                - info
        description: List of detected gaps
      recommendations:
        type: array
        items:
          type: object
          properties:
            priority:
              type: string
              enum:
                - P0
                - P1
                - P2
            description:
              type: string
            fix_type:
              type: string
              enum:
                - template_fix
                - dsl_fix
                - regeneration
        description: Prioritized improvement recommendation list
    required:
      - audit_type
      - total_dimensions
      - pass_count
      - miss_count
