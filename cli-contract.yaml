# yaml-language-server: $schema=./node_modules/cli-contracts/schemas/cli-contract.schema.json
cliContracts: 0.1.0

info:
  title: agent-contracts CLI
  version: 0.19.2
  description: >-
    Declarative YAML DSL toolkit for defining, validating, and rendering
    multi-agent development workflows. Provides static validation,
    semantic linting, prompt rendering, guardrail generation, and
    completeness scoring for agent contract definitions.
  license:
    name: MIT
  contact:
    name: foo-ogawa
    url: https://github.com/foo-ogawa/agent-contracts

commandSets:
  agent-contracts:
    summary: Agent contracts tooling — validate, lint, render DSL files.
    executable: agent-contracts

    globalOptions:
      - name: version
        aliases: [V]
        description: Print version and exit.
        schema:
          type: boolean

      - name: help
        aliases: [h]
        description: Show help and exit.
        schema:
          type: boolean

    commands:
      # ── resolve ───────────────────────────────────────
      resolve:
        summary: Resolve DSL (load + merge extends) and output YAML.
        description: >-
          Loads the agent-contracts DSL file, merges all extends
          inheritance chains, substitutes variables from config, and
          outputs the fully resolved result as YAML or JSON.
        usage:
          - agent-contracts resolve
          - agent-contracts resolve path/to/agent-contracts.yaml
          - agent-contracts resolve --format json
          - agent-contracts resolve --expand-defaults
          - agent-contracts resolve -c agent-contracts.config.yaml

        arguments:
          - name: dir
            index: 0
            required: false
            description: Path to agent-contracts.yaml.
            schema:
              type: string
              default: agent-contracts.yaml
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

        options:
          - name: config
            aliases: [c]
            description: Path to agent-contracts.config.yaml.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: false
              mediaType: application/yaml
              encoding: utf-8

          - name: team
            description: Limit to one team (multi-team config only).
            valueName: id
            schema:
              type: string

          - name: format
            description: Output format.
            valueName: format
            schema:
              type: string
              enum: [text, json]
              default: text

          - name: expand-defaults
            description: >-
              Expand all Zod default values in output. Fields like
              required_validations, tags, and can_read_artifacts are
              written explicitly instead of relying on schema defaults.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Resolved DSL output successfully.
            stdout:
              format: '{options.format}'
              schemaNote: >-
                Output format depends on --format option. Defaults to
                text (YAML representation); json produces a JSON object.

          '1':
            description: Resolution failed (file not found, parse error, or config error).
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []

      # ── validate ──────────────────────────────────────
      validate:
        summary: Validate DSL against schema and check references.
        description: >-
          Validates the resolved DSL against the Zod schema, checks
          inter-entity references (agent→task, task→artifact, etc.),
          and validates handoff schemas. Reports diagnostics with
          severity levels.
        usage:
          - agent-contracts validate
          - agent-contracts validate path/to/agent-contracts.yaml
          - agent-contracts validate --strict
          - agent-contracts validate --format json
          - agent-contracts validate --quiet

        arguments:
          - name: dir
            index: 0
            required: false
            description: Path to agent-contracts.yaml.
            schema:
              type: string
              default: agent-contracts.yaml
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

        options:
          - name: config
            aliases: [c]
            description: Path to agent-contracts.config.yaml.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: false
              mediaType: application/yaml
              encoding: utf-8

          - name: team
            description: Limit to one team (multi-team config only).
            valueName: id
            schema:
              type: string

          - name: format
            description: Diagnostic output format.
            valueName: format
            schema:
              type: string
              enum: [text, json]
              default: text

          - name: quiet
            description: Suppress output on success.
            schema:
              type: boolean
              default: false

          - name: strict
            description: Treat warnings as errors.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Validation passed. No errors found.
            stdout:
              format: '{options.format}'
              schemaNote: >-
                Output format depends on --format option. Text shows
                human-readable diagnostics; json produces structured
                validation results.

          '1':
            description: Validation failed or unexpected error.
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []

      # ── lint ──────────────────────────────────────────
      lint:
        summary: Run semantic lint rules on resolved DSL.
        description: >-
          Runs TypeScript-based semantic lint rules and Spectral rules
          on the resolved DSL. Checks for best-practice violations,
          naming conventions, and structural issues beyond schema
          conformance.
        usage:
          - agent-contracts lint
          - agent-contracts lint path/to/agent-contracts.yaml
          - agent-contracts lint --strict
          - agent-contracts lint --format json

        arguments:
          - name: dir
            index: 0
            required: false
            description: Path to agent-contracts.yaml.
            schema:
              type: string
              default: agent-contracts.yaml
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

        options:
          - name: config
            aliases: [c]
            description: Path to agent-contracts.config.yaml.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: false
              mediaType: application/yaml
              encoding: utf-8

          - name: team
            description: Limit to one team (multi-team config only).
            valueName: id
            schema:
              type: string

          - name: format
            description: Output format.
            valueName: format
            schema:
              type: string
              enum: [text, json]
              default: text

          - name: quiet
            description: Suppress output on success.
            schema:
              type: boolean
              default: false

          - name: strict
            description: Treat warnings as errors.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Lint passed. No errors or warnings.
            stdout:
              format: '{options.format}'
              schemaNote: >-
                Output format depends on --format option. Text shows
                human-readable diagnostics; json produces structured
                lint results.

          '1':
            description: Lint failed or unexpected error.
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []

      # ── render ────────────────────────────────────────
      render:
        summary: Render resolved DSL with Handlebars templates.
        description: >-
          Renders output files from the resolved DSL using Handlebars
          templates configured in agent-contracts.config.yaml. Supports
          drift detection via --check mode. Requires a config file.
        usage:
          - agent-contracts render -c agent-contracts.config.yaml
          - agent-contracts render -c agent-contracts.config.yaml --check
          - agent-contracts render --quiet

        options:
          - name: config
            aliases: [c]
            description: Path to agent-contracts.config.yaml.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: false
              mediaType: application/yaml
              encoding: utf-8

          - name: team
            description: Limit to one team (multi-team config only).
            valueName: id
            schema:
              type: string

          - name: check
            description: Check for drift without writing files.
            schema:
              type: boolean
              default: false

          - name: quiet
            description: Suppress output on success.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Render succeeded (or no drift detected in --check mode).
            stdout:
              format: text

          '1':
            description: >-
              Render failed, config not found, schema validation failed,
              or drift detected in --check mode.
            stderr:
              format: text

        x-agent:
          riskLevel: medium
          requiresConfirmation: false
          idempotent: true
          idempotentNote: >-
            Output is deterministic from DSL input and templates.
            Repeated runs produce identical files. Confirmation is not
            required because the command is idempotent and --check
            provides a side-effect-free preview mode.
          sideEffects:
            - file_write
          sideEffectNote: >-
            Writes rendered files to configured output paths. No file
            writes occur when --check is specified.
          safeDryRunOption: check
          recommendedBeforeUse:
            - Ensure agent-contracts.config.yaml exists with render targets.
            - Run validate first to confirm DSL is valid.

      # ── check ─────────────────────────────────────────
      check:
        summary: Run full pipeline — resolve, validate, lint, render --check.
        description: >-
          Executes the complete verification pipeline in order:
          (1) resolve DSL, (2) validate schema and references,
          (3) run lint rules, (4) check render drift via render --check.
          Steps 1–4 always run. Additionally, when the DSL declares
          cross-team interfaces, (5) verifies interface import
          consistency and (6) checks team-interface.yaml drift.
          Steps 5–6 are skipped when no cross-team interfaces exist.
        usage:
          - agent-contracts check -c agent-contracts.config.yaml
          - agent-contracts check -c agent-contracts.config.yaml --strict
          - agent-contracts check --format json --quiet

        options:
          - name: config
            aliases: [c]
            description: Path to agent-contracts.config.yaml.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: false
              mediaType: application/yaml
              encoding: utf-8

          - name: team
            description: Limit to one team (multi-team config only).
            valueName: id
            schema:
              type: string

          - name: format
            description: Diagnostic output format.
            valueName: format
            schema:
              type: string
              enum: [text, json]
              default: text

          - name: quiet
            description: Suppress output on success.
            schema:
              type: boolean
              default: false

          - name: strict
            description: Treat warnings as errors.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: All checks passed.
            stdout:
              format: '{options.format}'
              schemaNote: >-
                Output format depends on --format option. Text shows
                human-readable pipeline summary; json produces structured
                results per pipeline stage.

          '1':
            description: >-
              One or more checks failed — validation errors, lint errors,
              render drift, or missing interface files.
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []
          recommendedBeforeUse:
            - Ensure agent-contracts.config.yaml exists.

      # ── score ─────────────────────────────────────────
      score:
        summary: Calculate DSL completeness score.
        description: >-
          Evaluates the resolved DSL across 7 dimensions including
          artifact validation coverage, task validation coverage,
          guardrail policy coverage, workflow validation integration,
          schema completeness, cross-reference bidirectionality, and
          guardrail scope resolution. Returns a score out of 100 with
          optional CI gating via --threshold.
        usage:
          - agent-contracts score
          - agent-contracts score --format json
          - agent-contracts score --threshold 70
          - agent-contracts score -c agent-contracts.config.yaml

        arguments:
          - name: dir
            index: 0
            required: false
            description: Path to agent-contracts.yaml.
            schema:
              type: string
              default: agent-contracts.yaml
            file:
              mode: read
              exists: true
              mediaType: application/yaml
              encoding: utf-8

        options:
          - name: config
            aliases: [c]
            description: Path to agent-contracts.config.yaml.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: false
              mediaType: application/yaml
              encoding: utf-8

          - name: team
            description: Limit to one team (multi-team config only).
            valueName: id
            schema:
              type: string

          - name: format
            description: Output format.
            valueName: format
            schema:
              type: string
              enum: [text, json]
              default: text

          - name: threshold
            description: Minimum score; exit 1 if below (for CI gates).
            valueName: number
            schema:
              type: integer

        exits:
          '0':
            description: Score calculated (and above threshold if specified).
            stdout:
              format: '{options.format}'
              schemaNote: >-
                Output format depends on --format option. Text shows
                human-readable score breakdown; json produces structured
                score object with per-dimension details.

          '1':
            description: >-
              Score below threshold, schema validation failed,
              or unexpected error.
            stderr:
              format: text

        x-agent:
          riskLevel: low
          requiresConfirmation: false
          idempotent: true
          sideEffects: []

      # ── audit ───────────────────────────────────────────
      audit:
        summary: Run LLM-based semantic audit on DSL definitions and generated outputs.
        description: >-
          Performs LLM-based semantic analysis on DSL definitions and/or
          generated outputs. Three audit types are available: "render"
          checks whether generated files faithfully reflect the resolved
          DSL, "dsl" reviews DSL design for semantic coherence, and
          "prompt" verifies that generated prompts accurately express
          DSL intent. Uses agent-contracts-runtime (optional peer
          dependency) for LLM execution with handoff schema validation
          and follow-up recovery.
        usage:
          - agent-contracts audit render -c agent-contracts.config.yaml
          - agent-contracts audit dsl -c agent-contracts.config.yaml
          - agent-contracts audit prompt -c agent-contracts.config.yaml
          - agent-contracts audit all -c agent-contracts.config.yaml
          - agent-contracts audit dsl --dry-run -c agent-contracts.config.yaml
          - agent-contracts audit render --format json -c agent-contracts.config.yaml
          - agent-contracts audit dsl --scope agents:architect,implementer -c config.yaml

        arguments:
          - name: type
            index: 0
            required: false
            description: >-
              Audit type to run: render (semantic diff of generated
              outputs vs DSL), dsl (design coherence review), prompt
              (generated prompt fidelity check), or all (run all three).
            schema:
              type: string
              enum: [render, dsl, prompt, all]
              default: all

        options:
          - name: config
            aliases: [c]
            description: Path to agent-contracts.config.yaml.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: false
              mediaType: application/yaml
              encoding: utf-8

          - name: team
            description: Limit to one team (multi-team config only).
            valueName: id
            schema:
              type: string

          - name: format
            description: Output format.
            valueName: format
            schema:
              type: string
              enum: [text, json, markdown]
              default: text

          - name: scope
            description: >-
              Limit audit scope to specified entities
              (e.g. agents:architect,implementer).
            valueName: entities
            schema:
              type: string

          - name: dry-run
            description: Output the audit prompt without calling LLM.
            schema:
              type: boolean
              default: false

          - name: adapter
            description: >-
              SDK adapter to use for LLM calls
              (overrides config audit.adapter).
            valueName: name
            schema:
              type: string

          - name: model
            description: LLM model override (overrides config audit.model).
            valueName: name
            schema:
              type: string

        exits:
          '0':
            description: No critical findings detected.
            stdout:
              format: '{options.format}'
              schemaNote: >-
                Audit findings are always emitted on stdout as the primary
                output. Format depends on --format option (text, json, or
                markdown).

          '1':
            description: Critical findings detected.
            stderr:
              format: text
              schemaNote: >-
                Summary diagnostic on stderr. Structured findings are
                emitted on stdout in the requested --format.
            stdout:
              format: '{options.format}'
              schemaNote: >-
                Full findings output. Exit 1 indicates at least one
                critical-severity finding exists; the findings themselves
                are valid structured data, not error messages.

          '2':
            description: Invalid input or configuration error.
            stderr:
              format: text

          '3':
            description: LLM adapter error (API failure, runtime not installed).
            stderr:
              format: text

        x-agent:
          riskLevel: medium
          requiresConfirmation: false
          idempotent: true
          sideEffects:
            - network
          sideEffectNote: >-
            Makes LLM API calls to the configured adapter (e.g. OpenAI,
            Gemini, Cursor) unless --dry-run is specified. Incurs token
            cost and sends DSL content to the LLM provider.
          safeDryRunOption: dry-run
          expectedDurationMs: 120000
          retryableExitCodes: [3]
          recommendedBeforeUse:
            - Ensure agent-contracts.config.yaml exists with render targets.
            - Run validate first to confirm DSL is valid.
            - Install agent-contracts-runtime if not using --dry-run.

      # ── generate ──────────────────────────────────────
      generate:
        summary: Generate guardrail or interface artifacts from DSL.
        description: >-
          Generates runtime artifacts from the DSL. When type is
          "guardrails" (default), produces guardrail binding files from
          DSL, policies, and software bindings. When type is "interface",
          generates a team interface YAML/JSON file from the DSL's
          team_interface section.
        usage:
          - agent-contracts generate -c agent-contracts.config.yaml
          - agent-contracts generate guardrails -c agent-contracts.config.yaml
          - agent-contracts generate guardrails --binding cursor-rules
          - agent-contracts generate guardrails --dry-run
          - agent-contracts generate interface -c agent-contracts.config.yaml
          - agent-contracts generate interface --format json
          - agent-contracts generate interface -o team-interface.yaml --dry-run

        arguments:
          - name: type
            index: 0
            required: false
            description: Type of artifacts to generate.
            schema:
              type: string
              enum: [guardrails, interface]
              default: guardrails

        options:
          - name: config
            aliases: [c]
            description: Path to agent-contracts.config.yaml.
            valueName: path
            schema:
              type: string
            file:
              mode: read
              exists: false
              mediaType: application/yaml
              encoding: utf-8

          - name: team
            description: Limit to one team (multi-team config only).
            valueName: id
            schema:
              type: string

          - name: binding
            description: Filter to specific software binding(s). Guardrails type only.
            valueName: name
            repeatable: true
            schema:
              type: string

          - name: output
            aliases: [o]
            description: Output path for generated team interface. Interface type only.
            valueName: path
            schema:
              type: string
            file:
              mode: write
              mediaType: application/yaml
              encoding: utf-8

          - name: format
            description: Output format for team interface (yaml or json). Interface type only.
            valueName: format
            schema:
              type: string
              enum: [yaml, json]
              default: yaml

          - name: dry-run
            description: Print what would be generated without writing files.
            schema:
              type: boolean
              default: false

          - name: quiet
            description: Suppress output on success.
            schema:
              type: boolean
              default: false

        exits:
          '0':
            description: Generation succeeded.
            stdout:
              format: text

          '1':
            description: >-
              Generation failed — unknown type, schema validation failed,
              config not found, or error-level diagnostics.
            stderr:
              format: text

        x-agent:
          riskLevel: medium
          requiresConfirmation: false
          idempotent: true
          idempotentNote: >-
            Output is deterministic from DSL input, policies, and
            bindings. Repeated runs produce identical files.
            Confirmation is not required because the command is
            idempotent and --dry-run provides a side-effect-free
            preview mode.
          sideEffects:
            - file_write
          sideEffectNote: >-
            Writes guardrail binding files or team interface files to
            configured output paths. No file writes occur when
            --dry-run is specified.
          safeDryRunOption: dry-run
          recommendedBeforeUse:
            - Ensure agent-contracts.config.yaml exists with binding definitions.
            - Run validate first to confirm DSL is valid.
